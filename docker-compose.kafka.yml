# Kafka Foundation for Aran eFRM AI Pipeline
# This is the first step toward the documented architecture:
#   Edge Sensor → WAAP → Brain → Kafka → eFRM AI → ASPM
#
# Usage:
#   docker-compose -f docker-compose.kafka.yml up -d
#   docker-compose -f docker-compose.kafka.yml down

version: '3.8'

services:
  # ============================================================================
  # Zookeeper (Kafka dependency)
  # ============================================================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.3
    container_name: aran-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-logs:/var/lib/zookeeper/log
    networks:
      - aran-kafka-network
    healthcheck:
      test: ["CMD", "bash", "-c", "echo 'ruok' | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================================
  # Kafka Broker
  # ============================================================================
  kafka:
    image: confluentinc/cp-kafka:7.5.3
    container_name: aran-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"      # PLAINTEXT (dev only)
      - "9093:9093"      # SSL (production)
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      
      # Listeners
      KAFKA_LISTENERS: PLAINTEXT://:9092,SSL://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,SSL://kafka:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,SSL:SSL
      
      # Security (dev: PLAINTEXT, prod: SSL only)
      KAFKA_SECURITY_INTER_BROKER_PROTOCOL: PLAINTEXT
      KAFKA_SSL_KEYSTORE_FILENAME: kafka.keystore.jks
      KAFKA_SSL_KEYSTORE_CREDENTIALS: keystore_creds
      KAFKA_SSL_KEY_CREDENTIALS: ssl_key_creds
      KAFKA_SSL_TRUSTSTORE_FILENAME: kafka.truststore.jks
      KAFKA_SSL_TRUSTSTORE_CREDENTIALS: truststore_creds
      
      # Performance tuning for telemetry ingestion
      KAFKA_NUM_PARTITIONS: 12
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1  # Set to 3 in production
      KAFKA_LOG_RETENTION_HOURS: 168        # 7 days
      KAFKA_LOG_SEGMENT_BYTES: 1073741824   # 1GB segments
      
      # Auto-create topics (disable in production)
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka-data:/var/lib/kafka/data
      - ./certs:/etc/kafka/secrets  # Mount SSL certs
    networks:
      - aran-kafka-network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================================
  # Schema Registry (for Avro/protobuf schemas)
  # ============================================================================
  schema-registry:
    image: confluentinc/cp-schema-registry:7.5.3
    container_name: aran-schema-registry
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    networks:
      - aran-kafka-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/subjects"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================================
  # Kafka Connect (for data pipeline)
  # ============================================================================
  kafka-connect:
    image: confluentinc/cp-kafka-connect:7.5.3
    container_name: aran-kafka-connect
    depends_on:
      - kafka
      - schema-registry
    ports:
      - "8083:8083"
    environment:
      CONNECT_BOOTSTRAP_SERVERS: kafka:9092
      CONNECT_REST_ADVERTISED_HOST_NAME: kafka-connect
      CONNECT_REST_PORT: 8083
      CONNECT_GROUP_ID: aran-connect
      CONNECT_CONFIG_STORAGE_TOPIC: connect-configs
      CONNECT_OFFSET_STORAGE_TOPIC: connect-offsets
      CONNECT_STATUS_STORAGE_TOPIC: connect-status
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_KEY_CONVERTER: org.apache.kafka.connect.storage.StringConverter
      CONNECT_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_INTERNAL_KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_INTERNAL_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
    networks:
      - aran-kafka-network

  # ============================================================================
  # Kafka UI (for monitoring)
  # ============================================================================
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: aran-kafka-ui
    depends_on:
      - kafka
      - schema-registry
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: aran-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8081
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_NAME: connect
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_ADDRESS: http://kafka-connect:8083
    networks:
      - aran-kafka-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================================
  # Redis (for threat fingerprint caching)
  # ============================================================================
  redis:
    image: redis:7-alpine
    container_name: aran-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - aran-kafka-network
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================================
  # TimescaleDB (for time-series threat logs)
  # ============================================================================
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: aran-timescaledb
    ports:
      - "5433:5432"  # Different port to avoid conflict with main postgres
    environment:
      POSTGRES_USER: aran_telemetry
      POSTGRES_PASSWORD: ${ARAN_TSDB_PASSWORD:-aran_secure_123}
      POSTGRES_DB: aran_threat_logs
    volumes:
      - timescaledb-data:/var/lib/postgresql/data
      - ./db/init-timescale.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - aran-kafka-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aran_telemetry -d aran_threat_logs"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  aran-kafka-network:
    driver: bridge

volumes:
  zookeeper-data:
  zookeeper-logs:
  kafka-data:
  redis-data:
  timescaledb-data:
