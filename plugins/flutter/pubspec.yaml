name: aran_rasp
description: Blackbox Runtime Application Self-Protection engine for Flutter applications
version: 1.0.0
homepage: https://github.com/aran/aran-rasp-flutter

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  ffi: ^2.1.0
  plugin_platform_interface: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  plugin_platform_interface: ^2.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.aran.rasp
        pluginClass: RASPPlugin
      ios:
        pluginClass: RASPPlugin
