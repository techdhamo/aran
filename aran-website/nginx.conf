events {
    worker_connections 1024;
}

http {
    server {
        listen 80;
        server_name localhost;

        location /app/ {
            alias /usr/share/nginx/html/;
            try_files $uri $uri/ /index.html;
        }

        location /app {
            return 301 /app/;
        }

        location / {
            return 404;
        }
    }
}
