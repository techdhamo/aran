version: '3.8'

services:
  nexus:
    image: sonatype/nexus3:latest
    container_name: aran-nexus
    ports:
      - "13221:8081"
    volumes:
      - nexus-data:/nexus-data
    environment:
      - NEXUS_CONTEXT=nexus
    restart: unless-stopped
    networks:
      - aran-network

  nginx:
    image: nginx:alpine
    container_name: aran-nginx
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - nexus
    restart: unless-stopped
    networks:
      - aran-network

  backup:
    image: alpine:latest
    container_name: aran-backup
    volumes:
      - nexus-data:/nexus-data
      - ./backups:/backups
    command: >
      sh -c "
        while true; do
          tar -czf /backups/nexus-backup-$(date +%Y%m%d-%H%M%S).tar.gz /nexus-data
          find /backups -name 'nexus-backup-*.tar.gz' -mtime +7 -delete
          sleep 86400
        done
      "
    restart: unless-stopped
    networks:
      - aran-network

volumes:
  nexus-data:
    driver: local

networks:
  aran-network:
    driver: bridge
